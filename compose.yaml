services:
  postgres:
    image: postgres:16-alpine
    container_name: asterorm-test-db
    environment:
      POSTGRES_USER: orm_test
      POSTGRES_PASSWORD: orm_test
      POSTGRES_DB: orm_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orm_test -d orm_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
